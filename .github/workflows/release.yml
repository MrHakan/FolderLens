name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pip install pytest
          python -m pytest tests -v

      - name: Build standalone executable
        run: >
          pyinstaller --onefile --windowed --name FolderLens
          --hidden-import customtkinter
          --hidden-import darkdetect
          --hidden-import PIL
          --hidden-import PIL.Image
          --hidden-import PIL.ImageTk
          --collect-all customtkinter
          main.py

      - name: Smoke test executable
        shell: pwsh
        run: |
          if (-not (Test-Path dist\FolderLens.exe)) { throw "FolderLens.exe was not built" }
          $p = Start-Process -FilePath dist\FolderLens.exe -ArgumentList '--version' -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "Smoke test failed with exit code $($p.ExitCode)" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FolderLens-windows
          path: dist/FolderLens.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FolderLens.exe
          generate_release_notes: true
